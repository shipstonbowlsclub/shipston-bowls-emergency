<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Friendly Players</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; }
  h2 { margin-bottom: 10px; }
  select, button { font-size: 24px; margin: 5px 0; }
  .member-list { border: 1px solid #ccc; padding: 10px; max-height: 250px; overflow-y: auto; }
  .member-list label { display: block; margin-bottom: 3px; cursor: pointer; font-size:18px; }
  .member-list input { transform: scale(1.3); margin-right: 10px; }
  button { padding: 10px 20px; }
  #status { margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>
<h2>Friendly League Players</h2>
<label for="matchSelect">Select Match:</label>
<select id="matchSelect">
  <option value="">Select Match</option>
  <option value="Adderbury">Adderbury</option>
<option value="Aston Somerville">Aston Somerville</option>
<option value="Blockley">Blockley</option>
<option value="Chipping Campden">Chipping Campden</option>
<option value="FISSC">FISSC</option>
<option value="Ilmington">Ilmington</option>
<option value="Kineton">Kineton</option>
<option value="Wellesbourne">Wellesbourne</option>
</select>

<br>

<label>Select Members:</label>
<div class="member-list" id="membersSelect"></div>

<br>

<h3>Selected players:</h3>
<div id="selected-members" style="border:1px solid #ccc; padding:8px; max-height:120px; overflow-y:auto;">
  None selected
</div>

<button id="submitBtn">Submit Players</button>

<p id="status"></p>

<script>

// Player list
const members = [
  { name: "Bernard Sturgess", code: "7096" },
  { name: "Bill Emm", code: "3978" },
  { name: "Brian Newson", code: "2024" },
  { name: "Chris Rudd", code: "1374" },
  { name: "Colin Jones", code: "2035" },
  { name: "Doris Paish", code: "1625" },
  { name: "Gary Garside", code: "9214" },
  { name: "Geoff Rudd", code: "0431" },
  { name: "Gerald Smith", code: "8519" },
  { name: "Ieuan Edwards", code: "0339" },
  { name: "Jeff Paish", code: "6697" },
  { name: "Jennifer Gardiner", code: "6937" },
  { name: "John Brain", code: "0179" },
  { name: "John Gardiner", code: "3809" },
  { name: "Lynda Jones", code: "8020" },
  { name: "Marilyn Gabb", code: "6108" },
  { name: "Martin Corbett", code: "0282" },
  { name: "Pat Reed", code: "9587" },
  { name: "Paul Chapman", code: "6095" },
  { name: "Peter Betteridge", code: "8882" },
  { name: "Phillip Short", code: "4366" },
  { name: "Richard Baldwin", code: "7074" },
  { name: "Stephen Yates", code: "5754" },
  { name: "Terry Gabb", code: "4800" },
  { name: "Thomas Slinger", code: "3616" },
  { name: "Tom Reed", code: "2999" },
  { name: "Ully Beauchamp", code: "2604" }
];

// ? Generate checkbox list
const container = document.getElementById("membersSelect");

members.forEach(member => {
  const label = document.createElement("label");

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.value = member.name;  // sending name (matches your CSV)
  
  // ?? ADD THIS LINE
  checkbox.addEventListener("change", updateSelected);

  label.appendChild(checkbox);
  label.appendChild(document.createTextNode(member.name));

  container.appendChild(label);
});

// new code
function updateSelected() {
  const selected = Array.from(
    document.querySelectorAll('#membersSelect input:checked')
  ).map(cb => cb.value);

  const display = document.getElementById("selected-members");

  display.innerHTML = selected.length
    ? `<b>${selected.length} selected:</b><br>` + selected.join('<br>')
    : 'None selected';
}

// ? Submit handler
document.getElementById("submitBtn").addEventListener("click", async (e) => {
  const button = e.target;

  // ?? stop double clicks immediately
  if (button.disabled) return;
  button.disabled = true;
  button.textContent = "Submitting...";

  const match = document.getElementById("matchSelect").value;
  const selectedMembers = Array.from(
    document.querySelectorAll('#membersSelect input:checked')
  ).map(cb => cb.value);

  if (!match) {
    alert("Please select a match.");
    button.disabled = false;
    button.textContent = "Submit Players";
    return;
  }

  if (selectedMembers.length === 0) {
    alert("Please select the members.");
    button.disabled = false;
    button.textContent = "Submit Players";
    return;
  }

  
const today = new Date().toLocaleDateString('en-GB');

const csv = selectedMembers
  .map(name => `${match},${today},${name}`)
  .join('\n');

const formData = new FormData();
formData.append("access_key", "4a3d32e6-d9a3-4bb4-82da-17b73d410cd6");
formData.append("subject", `Friendly League - ${match}`);
formData.append("message", csv);

try {
  const res = await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    body: formData
  });

  const result = await res.json();
  console.log(result);

  if (result.success) {
    document.getElementById("status").textContent =
      "Players submitted successfully";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 3000);

  } else {
    document.getElementById("status").textContent =
      "Submission failed";

    button.disabled = false;
    button.textContent = "Submit Players";
  }

} catch (err) {
  document.getElementById("status").textContent =
    "Request failed: " + err;

  button.disabled = false;
  button.textContent = "Submit Players";
}
});
</script>
</body>
</html>
